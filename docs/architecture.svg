<text x="40" y="38.0" font-size="28" fill="#1e1e1e" text-anchor="start">AgentVault — high level architecture</text>
<text x="56" y="110.0" font-size="18" fill="#0c8599" text-anchor="start">Users</text>
<text x="140.0" y="186.0" font-size="18" fill="#1e1e1e" text-anchor="middle">User A</text>
<text x="140.0" y="276.0" font-size="18" fill="#1e1e1e" text-anchor="middle">User B</text>
<text x="356" y="110.0" font-size="18" fill="#2f9e44" text-anchor="start">Vault (ERC-4626)</text>
<text x="380" y="196.0" font-size="16" fill="#1e1e1e" text-anchor="start">Vault</text>
<text x="380" y="216.0" font-size="16" fill="#1e1e1e" text-anchor="start">— mints/burns shares</text>
<text x="380" y="236.0" font-size="16" fill="#1e1e1e" text-anchor="start">— auto-rebalance</text>
<text x="380" y="256.0" font-size="16" fill="#1e1e1e" text-anchor="start">— factory + AccessControl root</text>
<text x="716" y="110.0" font-size="18" fill="#e8590c" text-anchor="start">Strategies (EIP-1167)</text>
<text x="820.0" y="182.0" font-size="16" fill="#1e1e1e" text-anchor="middle">Strategy 0</text>
<text x="820.0" y="202.0" font-size="16" fill="#1e1e1e" text-anchor="middle">60% weight</text>
<text x="820.0" y="292.0" font-size="16" fill="#1e1e1e" text-anchor="middle">Strategy 1</text>
<text x="820.0" y="312.0" font-size="16" fill="#1e1e1e" text-anchor="middle">40% weight</text>
<text x="1036" y="110.0" font-size="18" fill="#862e9c" text-anchor="start">External DeFi</text>
<text x="1130.0" y="174.0" font-size="16" fill="#1e1e1e" text-anchor="middle">Aave V3 Pool</text>
<text x="1130.0" y="254.0" font-size="16" fill="#1e1e1e" text-anchor="middle">Uniswap V3</text>
<text x="1130.0" y="334.0" font-size="16" fill="#1e1e1e" text-anchor="middle">Morpho</text>
<text x="56" y="470.0" font-size="18" fill="#495057" text-anchor="start">Off-chain actors</text>
<text x="471.0" y="523.0" font-size="15" fill="#1e1e1e" text-anchor="middle">Admin</text>
<text x="471.0" y="541.75" font-size="15" fill="#1e1e1e" text-anchor="middle">(multisig / DAO)</text>
<text x="471.0" y="603.0" font-size="15" fill="#1e1e1e" text-anchor="middle">Authority</text>
<text x="471.0" y="621.75" font-size="15" fill="#1e1e1e" text-anchor="middle">(rebalancer / keeper)</text>
<text x="821.0" y="523.0" font-size="15" fill="#1e1e1e" text-anchor="middle">Delegate 0</text>
<text x="821.0" y="541.75" font-size="15" fill="#1e1e1e" text-anchor="middle">AI agent EOA</text>
<text x="821.0" y="603.0" font-size="15" fill="#1e1e1e" text-anchor="middle">Delegate 1</text>
<text x="821.0" y="621.75" font-size="15" fill="#1e1e1e" text-anchor="middle">AI agent EOA</text>
<text x="230" y="143.0" font-size="13" fill="#1971c2" text-anchor="start">deposit assets</text>
<text x="600" y="183.0" font-size="13" fill="#2f9e44" text-anchor="start">weighted push</text>
<text x="935" y="158.0" font-size="13" fill="#e8590c" text-anchor="start">whitelisted calls</text>
<text x="830" y="393.0" font-size="13" fill="#c92a2a" text-anchor="start">executeAction</text>
<text x="480" y="423.0" font-size="13" fill="#495057" text-anchor="start">create / whitelist</text>
<text x="40" y="674.0" font-size="14" fill="#1e1e1e" text-anchor="start">Invariants:</text>
<text x="40" y="691.5" font-size="14" fill="#1e1e1e" text-anchor="start">• Solid arrows = on-chain token/value flow.  Dashed arrows = off-chain authorised calls.</text>
<text x="40" y="709.0" font-size="14" fill="#1e1e1e" text-anchor="start">• Agent EOAs never hold user funds — only call executeAction on their own strategy.</text>
<text x="40" y="726.5" font-size="14" fill="#1e1e1e" text-anchor="start">• Each strategy is an EIP-1167 clone with its own approvals; compromise is blast-radius-limited.</text>
